<div>
    <h1 class="text-white text-2xl">Auren</h1>
</div>
<nav [hidden]="isMobile()">
    <ul class="list-none flex gap-3 md:gap-10">
        @for (items of sidebarItems; track items.route) {
            <li>
                <a 
                    [routerLink]="items.route"
                    class="w-full py-2 px-3 cursor-pointer rounded-md transition-colors duration-150"
                >
                    <span 
                        class="text-gray-300 text-sm"
                        routerLinkActive="text-white" 
                    >
                        {{ items.label }}
                    </span>
                </a>
            </li>
        }
    </ul>
</nav>
<app-profile [hidden]="isMobile()"/> 
@if(isMobile()) {
    <button (click)="toggleMenu()">
        <span class="material-symbols-rounded text-white">
            menu
        </span>
    </button>
}
@if(isMobile() && isMenuOpen()) {
    <div 
        class="absolute z-50 left-0 top-0 right-0 bg-[#00753f] w-full pt-5 px-5 pb-10 flex flex-col items-center gap-5 rounded-b-2xl"
        [class.animate-slide-down]="!isClosing()"
        [class.animate-slide-up]="isClosing()"
    >
        <button (click)="toggleMenu()" class="w-full flex justify-end text-0">
            <span class="material-symbols-rounded text-white text-[1.8rem]!">
                close
            </span>
        </button>
        <ul class="list-none flex flex-col items-center gap-8 mt-5">
            @for (items of sidebarItems; track items.route) {
                <li>
                    <a 
                        [routerLink]="items.route"
                        class="w-full py-2 px-3 cursor-pointer rounded-md transition-colors duration-150"
                        (click)="closeMenu()"
                    >
                        <span 
                            class="text-white text-2xl"
                            routerLinkActive="text-black" 
                        >
                            {{ items.label }}
                        </span>
                    </a>
                </li>
            }
        </ul>
    </div>
}
